# Repo-root copy of examples/triage-github-actions/.github/workflows/triage.yml.
#
# GitHub only runs workflows from `.github/workflows/` at the repo root on the
# default branch — a workflow nested under examples/ never fires. So this repo
# dogfoods the triage agent by running it from here, with every `run:` step
# executing inside the example dir via `defaults.run.working-directory`. The
# example keeps its own copy of this file so it still works when cloned
# standalone (the clone-one-folder convention); this root copy is what actually
# triages issues in THIS repo. Keep the two in sync.
#
# A maintainer applies the `triage` label to an issue; that `labeled` event runs
# `flue run` once and the job exits. The workflow IS the trigger — there is no
# Flue channel here (contrast @flue/github's createGitHubChannel webhook server).
#
# Bedrock auth uses GitHub OIDC — NO long-lived AWS keys. The job mints a
# short-lived OIDC token (`id-token: write`) and assumes a Bedrock-only IAM role
# via aws-actions/configure-aws-credentials; that role's trust policy must allow
# this repo's OIDC subject (token.actions.githubusercontent.com).
#
# Repository variables (Settings → Secrets and variables → Actions → Variables):
#   AWS_ROLE_ARN — the role to assume, scoped to bedrock:InvokeModel on the `us.`
#                  inference profile only (see AGENTS.md Bedrock gotcha).
#   AWS_REGION   — the Bedrock region, e.g. us-west-2.
# No model secret to store — that's the point of OIDC.
#   GITHUB_TOKEN — provided automatically by Actions; the `permissions:` block
#                  below scopes what it can do.
# Optional repository variable:
#   SKILLS_REPO  — Skills Project repo ("owner/repo") to fetch on its own release
#                  cycle; omit to use the committed .agents/skills/.
name: Issue Triage

on:
  issues:
    types: [labeled]

# Only run when the `triage` label is the one that was just applied. Without
# this gate every label change would start the agent.
jobs:
  triage:
    if: github.event.label.name == 'triage'
    runs-on: ubuntu-latest
    # Agents can run for a while (model + several API round-trips); give them room.
    timeout-minutes: 30
    permissions:
      id-token: write # mint the OIDC token used to assume the AWS Bedrock role
      contents: read # read repo files (code, CONTRIBUTING.md) for enrichment
      issues: write # post the triage comment and set labels back
    # Every `run:` step executes inside the example app, which holds the Flue
    # project (package.json, flue.config.ts, .agents/skills/). Action steps
    # (checkout/setup-node/OIDC) ignore this and run at the repo root.
    defaults:
      run:
        working-directory: examples/triage-github-actions
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci

      # Assume the Bedrock-only IAM role via GitHub OIDC. This exports
      # AWS_REGION + short-lived AWS_ACCESS_KEY_ID/SECRET/SESSION_TOKEN into the
      # job env, which the Bedrock SDK picks up automatically — no stored keys.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # Optional: fetch the Skills Project from its OWN repo (separate release
      # cycle from this agent) via skills.sh, then point Flue's sandbox cwd at it
      # (Flue discovers $SKILLS_DIR/.agents/skills/ at init()). `-a universal`
      # installs straight to .agents/skills/, so no symlink bridge is needed. Set
      # the SKILLS_REPO repository variable to enable; omit it to fall back to
      # the committed .agents/skills/. GITHUB_TOKEN authenticates the clone of a
      # private skills repo via an insteadOf rewrite.
      - name: Fetch skills (optional, separate release cycle)
        if: vars.SKILLS_REPO != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKILLS_REPO: ${{ vars.SKILLS_REPO }}
        run: |
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
          mkdir -p ./skills && (cd ./skills && npx -y skills add "https://github.com/${SKILLS_REPO}" -a universal -y)
          echo "SKILLS_DIR=$GITHUB_WORKSPACE/examples/triage-github-actions/skills" >> "$GITHUB_ENV"

      - name: Run triage agent
        # All workflow context reaches the step through env vars (never
        # interpolated directly into the shell) — the safe pattern even though
        # repo slug and issue number are not free-text input.
        env:
          # Model credential — AWS Bedrock (model amazon-bedrock/us.anthropic.
          # claude-sonnet-4-6). The OIDC step above already exported the
          # short-lived AWS_* env vars, so nothing to set here.
          # Outbound GitHub auth for the agent's Octokit tools. The default
          # GITHUB_TOKEN is scoped by the `permissions:` block above.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        # `flue run` input must be an object with a string "message"; the skill
        # parses owner/repo and the issue number out of it. The message is built
        # in the shell from env vars so no context is interpolated into YAML.
        run: |
          ./node_modules/.bin/flue run github-triage \
            --input "$(printf '{"message":"Triage GitHub issue %s#%s."}' "$REPO" "$ISSUE_NUMBER")"

# NOTE: we intentionally do NOT use `local({ env })` to forward secrets into the
# sandbox. Flue's GitHub Actions guide forwards env (e.g. GH_TOKEN) for agents
# whose model runs CLIs (gh/git) inside the sandbox shell. Our tools are typed
# defineTool Octokit functions that read process.env in the host Node process —
# the model never gets a shell or the token, so there is nothing to forward.
