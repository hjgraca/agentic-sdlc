# CI for the example apps: typecheck, build, and unit tests on every push/PR.
# Separate from the agent trigger workflows — this gates code health.
#
# The example list lives in .github/ci-examples.json (a DATA file), NOT inline
# here. That is deliberate: the implement agent adds a new example to CI by
# appending to that JSON with the default GITHUB_TOKEN, which cannot push changes
# under .github/workflows/ (it lacks the `workflows` permission). Keeping the list
# in a data file lets an agent-authored PR wire a new example into CI without a
# broader token (see issue #60). The `discover` job reads the file; `test`
# matrixes over it. The values are repo-controlled (a committed file), used only
# in paths — never interpolated into a run: shell string.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      examples: ${{ steps.list.outputs.examples }}
    steps:
      - uses: actions/checkout@v7
      - id: list
        # Emit the JSON array as a single-line output the matrix can fromJSON().
        run: echo "examples=$(jq -c . .github/ci-examples.json)" >> "$GITHUB_OUTPUT"

  test:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example: ${{ fromJSON(needs.discover.outputs.examples) }}
    defaults:
      run:
        working-directory: examples/${{ matrix.example }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: examples/${{ matrix.example }}/package-lock.json
      # --ignore-scripts: install pinned deps without running dependency
      # lifecycle scripts (no arbitrary install-time code).
      - run: npm ci --ignore-scripts
      - run: ./node_modules/.bin/tsc --noEmit
      - run: ./node_modules/.bin/flue build --target node
      - run: npm test
