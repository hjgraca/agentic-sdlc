# One-shot triage on a GitLab GROUP runner. Triggered by Jira's automation
# calling GitLab's pipeline trigger API with variables[ISSUE_KEY]={{issue.key}}.
#
# Set these as masked CI/CD variables at the GROUP level (Group → Settings →
# CI/CD → Variables) so every project in the group inherits them:
#   JIRA_BASE_URL, JIRA_EMAIL, JIRA_API_TOKEN, GITLAB_TOKEN
# A group runner (Group → Build → Runners) executes the job — no per-project
# runner needed. The pipeline + its trigger token remain PROJECT-scoped
# (GitLab has no group-level pipeline), but variables and runner are shared.
triage:
  image: node:22
  tags: [group-runner] # optional: target the group runner by tag
  rules:
    - if: '$ISSUE_KEY' # only run when triggered with an issue key
  script:
    - npm ci
    # `flue run` input must be an object with a string "message"; the skill
    # picks the issue key out of it.
    - ./node_modules/.bin/flue run jira-triage --input "{\"message\":\"Triage Jira issue $ISSUE_KEY.\"}"
  variables:
    GIT_DEPTH: "1"
