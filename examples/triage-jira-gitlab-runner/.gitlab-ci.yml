# One-shot triage on a GitLab runner. Triggered by Jira's automation calling
# GitLab's pipeline trigger API with variables[ISSUE_KEY]={{issue.key}}.
#
# Set these as masked CI/CD variables (Settings → CI/CD → Variables):
#   JIRA_BASE_URL, JIRA_EMAIL, JIRA_API_TOKEN, GITLAB_TOKEN
# Create a pipeline trigger token under Settings → CI/CD → Pipeline trigger tokens.
triage:
  image: node:22
  # Agents can run for a while (model + several API round-trips); give them room.
  timeout: 30 minutes
  # Only run for a pipeline-trigger carrying an issue key — never on a push/branch
  # pipeline. Jira's automation triggers with variables[ISSUE_KEY]={{issue.key}}.
  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger" && $ISSUE_KEY'
  before_script:
    - npm ci
    # Fetch the Skills Project from its OWN repo — separate release cycle from
    # this agent. Pin SKILLS_REF (a tag/sha) for reproducibility. Then point
    # Flue's sandbox cwd at it; Flue discovers $SKILLS_DIR/.agents/skills/ at
    # init(). Set SKILLS_REPO / SKILLS_REF as CI/CD variables. Omit all three
    # to fall back to the .agents/skills/ committed in this repo.
    # Registry alternative: npx -y @skills-sh/cli add <owner>/<repo> --dir ./skills/.agents/skills
    - |
      if [ -n "$SKILLS_REPO" ]; then
        git clone --depth 1 --branch "${SKILLS_REF:-main}" "$SKILLS_REPO" ./skills
        export SKILLS_DIR="$CI_PROJECT_DIR/skills"
      fi
  script:
    # `flue run` input must be an object with a string "message"; the skill
    # picks the issue key out of it.
    - ./node_modules/.bin/flue run jira-triage --input "{\"message\":\"Triage Jira issue $ISSUE_KEY.\"}"
  variables:
    GIT_DEPTH: "1"
  # NOTE: we intentionally do NOT use `local({ env })` to forward secrets into
  # the sandbox. Flue's GitLab CI guide forwards env for agents whose model runs
  # CLIs (glab/git) inside the sandbox shell. Our tools are typed defineTool
  # `fetch` functions that read process.env in the host Node process — the model
  # never gets a shell or the token (the guide's tighter, recommended pattern),
  # so there is nothing to forward.
