# Example secret. Do NOT commit real values — create the real secret with:
#   kubectl -n flue-triage create secret generic flue-triage-secrets \
#     --from-literal=JIRA_API_TOKEN=... \
#     --from-literal=GITLAB_TOKEN=... \
#     --from-literal=JIRA_WEBHOOK_SECRET=...
#
# AWS Bedrock auth is NOT a secret here — grant the pod an IAM role via IRSA
# (preferred) or mount AWS credentials. No model API key is needed.
# JIRA_WEBHOOK_SECRET must match the x-webhook-secret header (or ?secret=) the
# Jira automation sends.
apiVersion: v1
kind: Secret
metadata:
  name: flue-triage-secrets
  namespace: flue-triage
type: Opaque
stringData:
  JIRA_API_TOKEN: "REPLACE_ME"
  GITLAB_TOKEN: "REPLACE_ME"
  JIRA_WEBHOOK_SECRET: "REPLACE_ME"
