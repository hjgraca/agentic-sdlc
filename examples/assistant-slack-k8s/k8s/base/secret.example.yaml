# Example secret. Do NOT commit real values — create the real secret with:
#   kubectl -n flue-slack-assistant create secret generic flue-slack-assistant-secrets \
#     --from-literal=SLACK_SIGNING_SECRET=... \
#     --from-literal=SLACK_BOT_TOKEN=xoxb-... \
#     --from-literal=SKILLS_GIT_TOKEN=...   # only if the skills repo is private
#
# AWS Bedrock auth is NOT a secret here — grant the pod an IAM role via IRSA
# (preferred) or mount AWS credentials. No model API key is needed.
# SLACK_SIGNING_SECRET must match the signing secret of the Slack app whose
# events point at this server; SLACK_BOT_TOKEN (xoxb-…) is the bot user token.
apiVersion: v1
kind: Secret
metadata:
  name: flue-slack-assistant-secrets
  namespace: flue-slack-assistant
type: Opaque
stringData:
  SLACK_SIGNING_SECRET: "REPLACE_ME"
  SLACK_BOT_TOKEN: "REPLACE_ME"
  # Only needed if your Skills Project repo is private; omit otherwise.
  SKILLS_GIT_TOKEN: "REPLACE_ME"
